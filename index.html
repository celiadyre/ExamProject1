<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Online Shop</title>
  <link rel="stylesheet" href="css/global.css" />
</head>
<div id="cart-popup" class="cart-popup">
  <button id="close-cart-popup" class="cart-popup-close">x</button>
  <p>Added to cart!</p>
</div>
<body>
    <header>
    </header>
    <div id="menu-overlay" class="menu-overlay">
  <div class="menu-content">
    <h2>All products</h2>

    <ul class="menu-categories">
  <li><a href="index.html?category=beauty">Beauty</a></li>
  <li><a href="index.html?category=fashion">Fashion</a></li>
  <li><a href="index.html?category=audio">Audio</a></li>
  <li><a href="index.html?category=electronics">Electronics</a></li>
</ul>

    <h2>Best sellers</h2>
    <div class="best-sellers" id="best-sellers"></div>

    <a href="login.html" class="login-link">Log in</a>
  </div>
</div>
<div class="app">
    <main>
      <section class="hero" id="hero">
        <button class="carousel-btn prev" aria-label="Previous slide">←</button>
        <div id="slides"></div>
        <button class="carousel-btn next" aria-label="Next slide">→</button>
      </section>

      <div id="shop">
        <p class="loading">Loading products...</p>
      </div>
      
    </main>

    <footer>

    </footer>
  </div>

  <script>
    const API_URL = "./Data/products.json";

    const shop = document.querySelector("#shop");
    const slidesContainer = document.querySelector("#slides");
    const prevBtn = document.querySelector(".prev");
    const nextBtn = document.querySelector(".next");

    let slides = [];
    let currentSlide = 0;
    let carouselTimer;

    async function getProducts() {
  const response = await fetch(API_URL);

  if (!response.ok) {
    throw new Error(`Could not load products. Status: ${response.status}`);
  }

  const result = await response.json();

  if (!result.data) {
    throw new Error("products.json does not contain a data array.");
  }

  return result.data;
}

    function formatPrice(price) {
      return `$${Number(price).toFixed(2)}`;
    }

    function getDisplayPrice(product) {
      return product.discountedPrice ?? product.price;
    }

    function getCategoryProducts(products, tag) {
      return products
        .filter(product => product.tags.includes(tag))
    }

   function createProductCard(product) {
  return `
    <a class="product-card" href="#/product/${product.id}">
      <div class="product-image">
        <img
          src="${product.image.url}"
          alt="${product.image.alt || product.title}"
        />
      </div>

      <div class="product-info">
        <p class="product-title">${product.title}</p>
        <p class="product-price">${formatPrice(getDisplayPrice(product))}</p>
      </div>
    </a>
  `;
}

function renderProducts(products) {
  const categories = [
    { title: "Beauty", tag: "beauty" },
    { title: "Fashion", tag: "fashion" },
    { title: "Audio", tag: "audio" },
    { title: "Electronics", tag: "electronics" }
  ];

  const params = new URLSearchParams(window.location.search);
  const selectedCategory = params.get("category");

  const sortedCategories = selectedCategory
    ? [
        ...categories.filter(category => category.tag === selectedCategory),
        ...categories.filter(category => category.tag !== selectedCategory)
      ]
    : categories;

  shop.innerHTML = sortedCategories.map(category => {
    const categoryProducts = getCategoryProducts(products, category.tag);

    return `
      <section class="category" id="${category.tag}">
        <h2>${category.title}</h2>
        <div class="product-grid">
          ${categoryProducts.map(createProductCard).join("")}
        </div>
      </section>
    `;
  }).join("");
}

    function renderCarousel(products) {
      const featuredProducts = products
        .filter(product => product.rating >= 5)
        .slice(0, 3);

      slidesContainer.innerHTML = featuredProducts.map((product, index) => `
  <article class="slide ${index === 0 ? "active" : ""}">

    <a href="#/product/${product.id}" class="slide-link">
      <img
        src="${product.image.url}"
        alt="${product.image.alt || product.title}"
      />
      

      <div class="slide-content">
        <h1>${product.title}</h1>
        <h2>${formatPrice(getDisplayPrice(product))}</h2>
      </div>
    </a>

  </article>
`).join("");

      slides = document.querySelectorAll(".slide");
    }

    function showSlide(index) {
      if (!slides.length) return;

      slides[currentSlide].classList.remove("active");
      currentSlide = (index + slides.length) % slides.length;
      slides[currentSlide].classList.add("active");
    }

    function startCarousel() {
      clearInterval(carouselTimer);

      carouselTimer = setInterval(() => {
        showSlide(currentSlide + 1);
      }, 4000);
    }

    nextBtn.addEventListener("click", () => {
      showSlide(currentSlide + 1);
      startCarousel();
    });

    prevBtn.addEventListener("click", () => {
      showSlide(currentSlide - 1);
      startCarousel();
    });

    async function init() {
      try {
        const products = await getProducts();

        renderCarousel(products);
        renderProducts(products);
        startCarousel();
      } catch (error) {
        shop.innerHTML = `<p class="error">${error.message}</p>`;
      }
    }

    init();
  </script>
   <script type="module" src="./app.js"></script>
</body>
</html>
